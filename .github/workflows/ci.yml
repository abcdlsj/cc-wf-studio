name: CI

# Runs the repo's required quality gates (pnpm check + pnpm build) on every PR
# targeting main or auto-dev, and on pushes to those branches. This is the
# validation gate for both human-authored and agent-authored PRs — on auto-dev
# it is the ONLY gate before an agent PR auto-merges, so it must stay strict.
# See docs/task-automation.md.

on:
  pull_request:
    branches: [main, auto-dev]
  push:
    branches: [main, auto-dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-and-build:
    name: Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first: packages/mcp's type-check resolves @cc-wf-studio/core
      # from core's built dist/, so a fresh checkout must compile before
      # `pnpm check` can pass.
      - name: Build all packages
        run: pnpm build

      - name: Check (lint + type-check)
        run: pnpm check
