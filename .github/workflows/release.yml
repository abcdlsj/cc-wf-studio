name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Detect VSCode extension release
        id: detect-vsix
        run: |
          NEW_TAG=$(git tag --points-at HEAD | grep '^cc-wf-studio@' | head -1 || true)
          if [ -n "$NEW_TAG" ]; then
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "needs_vsix=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_vsix=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build VSCode extension
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        run: pnpm --filter cc-wf-studio run build

      - name: Package VSIX
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        run: pnpm --filter cc-wf-studio run package

      - name: Upload VSIX to GitHub Release
        if: steps.detect-vsix.outputs.needs_vsix == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VSIX_TAG: ${{ steps.detect-vsix.outputs.tag }}
        run: |
          VSIX_FILE=$(ls packages/vscode/*.vsix)
          gh release upload "$VSIX_TAG" "$VSIX_FILE" --clobber
