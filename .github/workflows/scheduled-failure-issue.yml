name: Report Scheduled Failures

# When an unattended run fails (a scheduled run, or CI on a push to main or
# auto-dev — auto-dev receives unattended agent auto-merges), nobody is
# watching the Actions tab — so surface it as an Issue instead.
# PR-triggered failures are excluded: the PR author already sees those.
# One open issue per workflow (deduped by title); repeat failures append
# a comment instead of filing a new issue.

on:
  workflow_run:
    workflows: ['CI', 'Security Scan']
    types: [completed]

permissions:
  issues: write

jobs:
  report:
    name: File or update failure issue
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event == 'schedule' ||
       (github.event.workflow_run.event == 'push' &&
        contains(fromJSON('["main", "auto-dev"]'), github.event.workflow_run.head_branch)))
    steps:
      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `[CI failure] ${run.name} failed on ${run.head_branch}`;
            const labels = ['ci-failure', 'auto-generated'];

            // Ensure labels exist (ignore "already exists" errors)
            for (const [name, color, description] of [
              ['ci-failure', 'D93F0B', 'An unattended workflow run failed'],
              ['auto-generated', 'BFDADC', 'Filed automatically (workflow or agent), not by a human'],
            ]) {
              try {
                await github.rest.issues.createLabel({ ...context.repo, name, color, description });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }

            const body = [
              `**Workflow**: ${run.name}`,
              `**Run**: ${run.html_url}`,
              `**Branch**: ${run.head_branch} @ \`${run.head_sha.slice(0, 7)}\``,
              `**Trigger**: ${run.event}`,
              '',
              'This issue was filed automatically because an unattended run failed.',
              'Close it once the failure is resolved — a later failure of the same',
              'workflow will reopen the conversation as a new issue or comment.',
            ].join('\n');

            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 100,
            });
            const existing = open.find((i) => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: existing.number,
                body: `Failed again: ${run.html_url} (\`${run.head_sha.slice(0, 7)}\`)`,
              });
              core.info(`Commented on existing issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels,
              });
              core.info(`Created issue #${issue.number}`);
            }
